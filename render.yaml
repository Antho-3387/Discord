services:
  - type: web
    name: discord-clone
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy --skip-generate
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: file:./discord.db
