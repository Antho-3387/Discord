services:
  - type: web
    name: discord-clone
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy --skip-generate
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: JWT_SECRET
        value: a8eed1b9e00168fdc2d1e4d1d789bc24b2c80f9dc73272405160da4c73f179bc
